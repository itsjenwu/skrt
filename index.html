<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たびポートフォリオ — Portfolio Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;600&display=swap');

        :root {
            --blush: #f2a7b0;
            --peach: #f7cba8;
            --sky: #7a9db8;
            --sage: #7aab88;
            --moss: #4e7a5a;
            --earth: #c9a97a;
            --cream: #e8ddc8;
            --ink: #2e2318;
            --lantern: #e87c3e;
            --sakura: #f4b8c8;
            --torii: #c94a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #4a6878;
            overflow: hidden;
            font-family: 'Noto Serif JP', serif;
            color: var(--ink);
        }

        #canvas {
            display: block;
        }

        /* ── TITLE ── */
        #title {
            position: fixed;
            top: 22px;
            left: 28px;
            z-index: 10;
            pointer-events: none;
        }

        #title-main {
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 26px;
            color: #e8ddc8;
            opacity: 0.9;
            letter-spacing: 2px;
            text-shadow: 1px 2px 0 rgba(255,255,255,0.5);
        }

        #title-sub {
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.6;
            letter-spacing: 4px;
            margin-top: 2px;
        }

        /* ── CONTROLS HINT ── */
        #controls-hint {
            position: fixed;
            bottom: 28px;
            left: 28px;
            font-size: 11px;
            color: #c8b89a;
            opacity: 0.65;
            line-height: 2;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
        }

            #controls-hint b {
                color: var(--torii);
                opacity: 1;
            }

        /* ── SPEEDOMETER ── */
        #speedometer {
            position: fixed;
            bottom: 28px;
            right: 28px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }

        #speed-val {
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 42px;
            color: #e87c3e;
            opacity: 0.7;
            line-height: 1;
        }

        #speed-label {
            font-size: 9px;
            color: #c8b89a;
            opacity: 0.5;
            letter-spacing: 3px;
        }

        /* ── MINIMAP ── */
        #minimap {
            position: fixed;
            top: 22px;
            right: 28px;
            width: 120px;
            height: 120px;
            border-radius: 4px;
            border: 1px solid rgba(46,35,24,0.15);
            background: rgba(20,32,40,0.82);
            box-shadow: 0 2px 12px rgba(46,35,24,0.1);
            overflow: hidden;
            z-index: 10;
        }

            #minimap canvas {
                width: 100%;
                height: 100%;
            }

        #minimap-label {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 7px;
            letter-spacing: 2px;
            color: var(--ink);
            opacity: 0.4;
        }

        /* ── PROMPT ── */
        #prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 60px));
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 10;
        }

            #prompt.visible {
                opacity: 1;
            }

        #prompt-key {
            display: inline-block;
            background: rgba(20,32,40,0.88);
            border: 1.5px solid #e87c3e;
            color: #e87c3e;
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 13px;
            padding: 8px 20px;
            letter-spacing: 2px;
            border-radius: 2px;
            box-shadow: 0 2px 16px rgba(201,74,26,0.2);
            animation: gentle-pulse 2s infinite;
        }

        #prompt-name {
            margin-top: 8px;
            font-size: 10px;
            color: var(--ink);
            opacity: 0.55;
            letter-spacing: 3px;
        }

        @keyframes gentle-pulse {
            0%,100% {
                box-shadow: 0 2px 16px rgba(201,74,26,0.2);
            }

            50% {
                box-shadow: 0 2px 28px rgba(201,74,26,0.45);
            }
        }

        /* ── PANEL ── */
        #panel {
            position: fixed;
            top: 0;
            right: -520px;
            width: 460px;
            height: 100vh;
            background: rgba(28,38,46,0.96);
            border-left: 2px solid rgba(201,74,26,0.35);
            padding: 52px 38px 40px;
            z-index: 20;
            transition: right 0.55s cubic-bezier(0.16,1,0.3,1);
            overflow-y: auto;
            pointer-events: none;
        }

            #panel.open {
                right: 0;
                pointer-events: all;
            }

            #panel::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: linear-gradient(180deg, var(--torii), var(--blush), var(--torii));
            }

        #panel-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: 1px solid rgba(232,124,62,0.5);
            color: #e87c3e;
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 5px 14px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

            #panel-close:hover {
                background: rgba(201,74,26,0.08);
            }

        .panel-kanji {
            font-size: 11px;
            color: #e87c3e;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .panel-title {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 28px;
            color: #e8ddc8;
            line-height: 1.25;
            margin-bottom: 6px;
        }

        .panel-subtitle {
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.7;
            letter-spacing: 3px;
            margin-bottom: 22px;
        }

        .panel-desc {
            font-size: 13px;
            color: #c8b8a0;
            opacity: 0.9;
            line-height: 2;
            margin-bottom: 28px;
        }

        .panel-divider {
            height: 1px;
            background: linear-gradient(90deg,rgba(201,74,26,0.25),transparent);
            margin: 22px 0;
        }

        .panel-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
        }

        .tech-tag {
            font-size: 10px;
            letter-spacing: 1px;
            border: 1px solid rgba(78,122,90,0.4);
            color: var(--moss);
            padding: 4px 12px;
            border-radius: 2px;
            background: rgba(122,171,136,0.08);
        }

        .panel-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-link {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 11px 22px;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

            .panel-link.primary {
                background: var(--torii);
                color: var(--cream);
                box-shadow: 0 3px 14px rgba(201,74,26,0.3);
            }

                .panel-link.primary:hover {
                    box-shadow: 0 4px 22px rgba(201,74,26,0.45);
                }

            .panel-link.secondary {
                border: 1px solid rgba(78,122,90,0.5);
                color: var(--moss);
                background: transparent;
            }

                .panel-link.secondary:hover {
                    background: rgba(122,171,136,0.1);
                }

        /* ── JOYSTICK ── */
        #joystick-zone {
            position: fixed;
            bottom: 32px;
            left: 32px;
            width: 130px;
            height: 130px;
            z-index: 30;
            display: none;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(254,246,236,0.3);
            border: 1.5px solid rgba(201,74,26,0.3);
            box-shadow: 0 2px 16px rgba(201,74,26,0.1);
        }

        #joystick-stick {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%,rgba(242,167,176,0.7),rgba(201,74,26,0.35));
            border: 1.5px solid rgba(201,74,26,0.6);
            box-shadow: 0 2px 12px rgba(201,74,26,0.3);
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
        }

        /* ── ENTER BTN ── */
        #enter-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: rgba(254,246,236,0.8);
            border: 1.5px solid rgba(201,74,26,0.5);
            color: var(--torii);
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3px;
            z-index: 30;
            cursor: pointer;
            animation: gentle-pulse 2s infinite;
            touch-action: manipulation;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

            #enter-btn.visible {
                opacity: 1;
                pointer-events: all;
            }

        #enter-btn-icon {
            font-size: 22px;
        }

        /* ── LOADING ── */
        #loading {
            position: fixed;
            inset: 0;
            background: #2a3a44;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s;
        }

        #loading-kanji {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 72px;
            color: #e87c3e;
            margin-bottom: 8px;
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0%,100% {
                opacity: 0.7;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.04)
            }
        }

        #loading-title {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 18px;
            color: #c8b89a;
            opacity: 0.85;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }

        #loading-bar-wrap {
            width: 220px;
            height: 2px;
            background: rgba(255,255,255,0.12);
        }

        #loading-bar {
            height: 100%;
            background: linear-gradient(90deg,var(--torii),var(--blush));
            width: 0%;
            transition: width 0.2s ease;
        }

        #loading-status {
            margin-top: 14px;
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.6;
            letter-spacing: 3px;
        }

        /* ── RESPONSIVE ── */
        @media(max-width:600px) {
            #panel {
                width: 100vw;
                right: -100vw;
                padding: 56px 22px 40px;
            }

                #panel.open {
                    right: 0;
                }

            .panel-title {
                font-size: 22px;
            }

            #title-main {
                font-size: 18px;
            }

            #minimap {
                top: 14px;
                right: 14px;
                width: 88px;
                height: 88px;
            }

            #speedometer {
                bottom: 175px;
                right: 16px;
            }

            #speed-val {
                font-size: 30px;
            }

            #controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>


    <div id="loading">
        <div id="loading-kanji">旅</div>
        <div id="loading-title">TABI PORTFOLIO</div>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
        <div id="loading-status">里山を描いています...</div>

    <canvas id="canvas"></canvas>

    <div id="title">

        <div id="title-sub">TABI PORTFOLIO · JOURNEY</div>

    <div id="minimap">

    </div>

    <div id="joystick-zone">
        <div id="joystick-base"></div>
        <div id="joystick-stick"></div>
    </div>

    <div id="enter-btn" onclick="mobileEnter()">
        <div id="enter-btn-icon">⛩</div>
        <div>ENTER</div>
    </div>

    <div id="prompt">
        <div id="prompt-key">[ E ] 探索する</div>
        <div id="prompt-name"></div>
    </div>

    <div id="panel">
        <button id="panel-close" onclick="closePanel()">✕ 閉じる</button>
        <div class="panel-kanji" id="panel-tag">作品</div>
        <div class="panel-title" id="panel-title">Project Title</div>
        <div class="panel-subtitle" id="panel-subtitle">SUBTITLE</div>
        <div id="panel-img-wrap" style="display:none;margin-bottom:18px;border-radius:3px;overflow:hidden;max-height:180px;">
            <img id="panel-img" src="" alt="" style="width:100%;height:180px;object-fit:cover;display:block;opacity:0;transition:opacity 0.5s;" onload="this.style.opacity=1" />
        </div>
        <div class="panel-desc" id="panel-desc">Description</div>
        <div class="panel-divider"></div>
        <div class="panel-tech" id="panel-tech"></div>
        <div class="panel-links">
            <a class="panel-link primary" id="panel-link1" href="#">作品を見る</a>
            <a class="panel-link secondary" id="panel-link2" href="#">ソースコード</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>// ─── PROJECT DATA ─────────────────────────────────────────────────────────────
        const PROJECTS = [

                desc: 'A 3rd-person rogue-lite action RPG developed by a team of 5 over one semester for CS6457 at Georgia Tech. Features an explorable world and an alchemy-based crafting system - brew bombs, potions, and oils to power up your combat. Served as UI Designer & Developer.',

                desc: 'After a wormhole drops our spaceship in an unknown location, a particle filter localizes us by measuring gravitational pull from planets. Estimates spaceship position (x,y), then computes the angle to Earth to beam messages home. Handles noisy sensors and nonlinear inverse-square gravity dynamics.',
                tech: ['Python', 'Particle Filter', 'Localization', 'SLAM'], link1: 'https://itsjenwu.com/lost-in-space/', link1Label: '作品を見る · View', link2: '#', link2Label: 'GitHub', img: 'https://itsjenwu.com/wp-content/uploads/2025/03/test4-1.gif', color: 0xc94a1a, position: { x: 26, z: -26 }
            },
            {
                id: 'p3', name: 'GOOGLE MY MAPS', tag: 'デザイン · GRAD SCHOOL', title: 'Google My Maps', subtitle: 'HCI STUDY · UX REDESIGN',
                desc: 'Team HCI project applying the full design lifecycle to Google\u0027s My Maps. Conducted needfinding surveys, heuristic evaluations, and iterative prototype testing to improve discoverability, social sharing, and layer usability - aiming to help users reach a flow-state while planning travel.',
                tech: ['Figma', 'Adobe XD', 'Adobe Premiere', 'Usability Testing'], link1: 'https://itsjenwu.com/google-my-maps/', link1Label: '作品を見る · View', link2: 'https://www.figma.com/proto/ghAAwCdKqpsikIBV2yiO5r/HCI', link2Label: 'Figma Prototype', img: 'https://itsjenwu.com/wp-content/uploads/2025/03/Melbourne-example.png', color: 0x7aab88, position: { x: -26, z: 26 }
            },
            {
                id: 'p4', name: 'WAREHOUSE SEARCH', tag: 'コード · GRAD SCHOOL', title: 'Warehouse Search', subtitle: 'A* PATH PLANNING',
                desc: 'Programmed a humanoid robot to navigate a 2D warehouse grid, pick up boxes, and deliver them to a target. Implemented A* search with a weighted Chebyshev heuristic to handle non-uniform movement costs (horizontal/vertical = 2, diagonal = 3) and backtracking to recover the optimal path.',
                tech: ['Python', 'A* Search', 'Path Planning', 'Heuristics'], link1: 'https://itsjenwu.com/warehouse-search/', link1Label: '作品を見る · View', link2: '#', link2Label: 'GitHub', img: 'https://itsjenwu.com/wp-content/uploads/2025/03/test4-2.gif', color: 0xf2a7b0, position: { x: 26, z: 26 }

            {
                id: 'p0', name: 'ABOUT ME', tag: 'こんにちは · HELLO', title: 'Jen Wu', subtitle: 'DEVELOPER & DESIGNER · BOSTON',
                desc: 'MS Computer Science (Interactive Intelligence) from Georgia Tech, BS CS + Art & Design from UIUC. Currently a Senior Technology Analyst at Accenture. Passionate about building things that sit at the intersection of code, design, and human experience.',
                tech: ['Georgia Tech', 'UIUC', 'Accenture', 'Greater Boston'], link1: 'https://www.linkedin.com/in/jenwu20/', link1Label: 'LinkedIn', link2: 'https://github.com/itsjenwu', link2Label: 'GitHub',
                img: 'https://itsjenwu.com/wp-content/uploads/2021/02/lotus-abstract-sticker.png',
                color: 0xf2c97a, isAboutMe: true, position: { x: 0, z: 0 }
            },
            {
                id: 'p5', name: 'GYST MUSEUM', tag: 'デザイン · UNDERGRAD', title: 'GYST Museum', subtitle: 'UX DESIGN - PEOPLES CHOICE',
                desc: 'Award-winning UX concept (Peoples Choice Award) tackling attention management for students. Designed an interactive museum space where students experiment with different study environments to find their flow. Full research, paper prototype, and high-fidelity Adobe XD build - team of 4 at UIUC.',
                tech: ['Adobe XD', 'Adobe Illustrator', 'UX Research', 'Prototyping'], link1: 'https://itsjenwu.com/gyst-museum/', link1Label: '作品を見る · View', link2: 'https://xd.adobe.com/view/f96f7328-9933-476e-8529-b29750e30fa9-ac3c/', link2Label: 'Try App', img: 'https://itsjenwu.com/wp-content/uploads/2021/02/gyst-poster.png', color: 0x7aaec8, position: { x: 0, z: -44 }
            },
        ];

        // ─── RENDERER ─────────────────────────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.72;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3a5a6e);
        scene.fog = new THREE.FogExp2(0x2e4a5c, 0.016);

        // Day/night cycle state
        const CYCLE_SPEED = 0.00018; // full cycle ~9 min
        let cycleT = 0.25; // start at dusk (0=midnight,0.25=dawn,0.5=noon,0.75=dusk)
        const skyColors = [{ t: 0, c: [0x0d1a2a] }, { t: 0.2, c: [0x1a2e44] }, { t: 0.28, c: [0xf4903a] }, { t: 0.35, c: [0x7ab0d8] }, { t: 0.5, c: [0x5a90c8] }, { t: 0.65, c: [0x7ab0d8] }, { t: 0.72, c: [0xf07830] }, { t: 0.8, c: [0x1a2e44] }, { t: 1, c: [0x0d1a2a] }];
        const fogColors = [{ t: 0, c: [0x060e18] }, { t: 0.25, c: [0x1a3048] }, { t: 0.5, c: [0x3a6080] }, { t: 0.75, c: [0x1a3048] }, { t: 1, c: [0x060e18] }];
        const sunColors = [{ t: 0, c: [0x102040] }, { t: 0.25, c: [0xff8030] }, { t: 0.5, c: [0xfff0d0] }, { t: 0.75, c: [0xff7020] }, { t: 1, c: [0x102040] }];
        const hemTopColors = [{ t: 0, c: [0x0a1828] }, { t: 0.5, c: [0x5a8ab8] }, { t: 1, c: [0x0a1828] }];
        function lerpCycleColor(arr, t) {
            for (let i = 0; i < arr.length - 1; i++) {
                if (t >= arr[i].t && t <= arr[i + 1].t) {
                    const f = (t - arr[i].t) / (arr[i + 1].t - arr[i].t);
                    const ca = arr[i].c[0], cb = arr[i + 1].c[0];
                    const r = ((ca >> 16) & 0xff) * (1 - f) + ((cb >> 16) & 0xff) * f;
                    const g = ((ca >> 8) & 0xff) * (1 - f) + ((cb >> 8) & 0xff) * f;
                    const b = (ca & 0xff) * (1 - f) + (cb & 0xff) * f;
                    return new THREE.Color((r / 255), (g / 255), (b / 255));
                }
            }
            return new THREE.Color(arr[0].c[0]);
        }
        function updateDayNight() {
            cycleT = (cycleT + CYCLE_SPEED) % 1;
            const sky = lerpCycleColor(skyColors, cycleT);
            scene.background = sky;
            scene.fog.color = lerpCycleColor(fogColors, cycleT);

        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        function getJoyCenter() { const r = joystickZone.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
        function updateJoystick(t) {
            const c = getJoyCenter(); let dx = t.clientX - c.x, dy = t.clientY - c.y;
            const d = Math.sqrt(dx * dx + dy * dy); if (d > STICK_LIMIT) { dx = (dx / d) * STICK_LIMIT; dy = (dy / d) * STICK_LIMIT; }
            joystick.x = dx / STICK_LIMIT; joystick.y = dy / STICK_LIMIT;
            joystickStick.style.transform = `translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        }
        joystickZone.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; joystick.active = true; joystick.touchId = t.identifier; updateJoystick(t); }, { passive: false });
        joystickZone.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === joystick.touchId) updateJoystick(t); }, { passive: false });
        joystickZone.addEventListener('touchend', e => { for (const t of e.changedTouches) if (t.identifier === joystick.touchId) { joystick.active = false; joystick.x = 0; joystick.y = 0; joystick.touchId = null; joystickStick.style.transform = 'translate(-50%,-50%)'; } });

        const keys = {};
        let carSpeed = 0, carAngle = 0;
        const MAX_SPEED = 1.95, ACCEL = 0.25, FRICTION = 0.7, TURN = 0.042;
        document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        function updateCar() {
            const fwd = keys['w'] || keys['arrowup'] || joystick.y < -0.2;
            const bwd = keys['s'] || keys['arrowdown'] || joystick.y > 0.2;
            const lft = keys['a'] || keys['arrowleft'] || joystick.x < -0.2;
            const rgt = keys['d'] || keys['arrowright'] || joystick.x > 0.2;
            const jm = joystick.active ? Math.abs(joystick.x) : 1;
            if (fwd) carSpeed = Math.min(carSpeed + ACCEL, MAX_SPEED);
            if (bwd) carSpeed = Math.max(carSpeed - ACCEL, -MAX_SPEED * 0.5);
            carSpeed *= FRICTION;
            if (Math.abs(carSpeed) > 0.005) {
                const dir = carSpeed > 0 ? 1 : -1, amt = TURN * (joystick.active ? jm * 1.2 : 1);
                if (lft) carAngle += amt * dir;
                if (rgt) carAngle -= amt * dir;
            }
            carGroup.position.x += Math.sin(carAngle) * carSpeed;
            carGroup.position.z += Math.cos(carAngle) * carSpeed;
            carGroup.rotation.y = carAngle;
            carGroup.position.x = Math.max(-88, Math.min(88, carGroup.position.x));
            carGroup.position.z = Math.max(-88, Math.min(88, carGroup.position.z));

        }

        // ─── CAMERA ──────────────────────────────────────────────────────────────────
        const camOff = new THREE.Vector3(0, 6, -13), camLk = new THREE.Vector3(0, 1, 5);
        let smoothCam = new THREE.Vector3(0, 6, 21);
        function updateCamera() {
            const rot = new THREE.Euler(0, carAngle, 0);
            smoothCam.lerp(carGroup.position.clone().add(camOff.clone().applyEuler(rot)), 0.09);
            camera.position.copy(smoothCam);
            camera.lookAt(carGroup.position.clone().add(camLk.clone().applyEuler(rot)));
        }

        // ─── PROXIMITY + PANEL ───────────────────────────────────────────────────────
        let nearStation = null, panelOpen = false;
        function checkProximity() {
            let closest = null, minD = 9;
            stations.forEach(s => {
                const dx = carGroup.position.x - s.group.position.x, dz = carGroup.position.z - s.group.position.z;
                const d = Math.sqrt(dx * dx + dz * dz); if (d < minD) { minD = d; closest = s; }
            });
            const pr = document.getElementById('prompt'), pn = document.getElementById('prompt-name'), eb = document.getElementById('enter-btn');
            if (closest && !panelOpen) { nearStation = closest; pr.classList.add('visible'); pn.textContent = closest.proj.name; eb.classList.add('visible'); }
            else { nearStation = null; pr.classList.remove('visible'); eb.classList.remove('visible'); }
        }
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'e' && nearStation && !panelOpen) openPanel(nearStation.proj);
            if (e.key === 'Escape') closePanel();
        });
        function mobileEnter() { if (nearStation && !panelOpen) openPanel(nearStation.proj); }
        window.mobileEnter = mobileEnter;
        function openPanel(proj) {
            panelOpen = true;
            document.getElementById('panel-tag').textContent = proj.tag;
            document.getElementById('panel-title').textContent = proj.title;
            document.getElementById('panel-subtitle').textContent = proj.subtitle;
            document.getElementById('panel-desc').textContent = proj.desc;
            document.getElementById('panel-tech').innerHTML = proj.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');
            document.getElementById('panel-link1').href = proj.link1;
            document.getElementById('panel-link1').textContent = proj.link1Label || '作品を見る · View';
            document.getElementById('panel-link2').href = proj.link2;
            document.getElementById('panel-link2').textContent = proj.link2Label || 'GitHub';
            // Panel image
            const imgWrap = document.getElementById('panel-img-wrap');
            const imgEl = document.getElementById('panel-img');
            if (proj.img) { imgWrap.style.display = 'block'; imgEl.style.opacity = '0'; imgEl.src = proj.img; }
            else { imgWrap.style.display = 'none'; imgEl.src = ''; }
            document.getElementById('panel').classList.add('open');
            document.getElementById('prompt').classList.remove('visible');
        }
        function closePanel() { panelOpen = false; document.getElementById('panel').classList.remove('open'); }
        window.closePanel = closePanel;

        // ─── MINIMAP ─────────────────────────────────────────────────────────────────
        const mmC = document.getElementById('minimap-canvas'), mmCtx = mmC.getContext('2d');
        const MM = 120, MW = 100;
        function toMM(x, z) { return { x: (x / MW + 0.5) * MM, y: (z / MW + 0.5) * MM }; }
        function drawMinimap() {
            mmCtx.fillStyle = 'rgba(205,190,165,0.9)'; mmCtx.fillRect(0, 0, MM, MM);
            const grd = mmCtx.createRadialGradient(MM / 2, MM / 2, 8, MM / 2, MM / 2, MM / 2);
            grd.addColorStop(0, 'rgba(170,205,150,0.45)'); grd.addColorStop(1, 'rgba(150,175,130,0.6)');
            mmCtx.fillStyle = grd; mmCtx.fillRect(0, 0, MM, MM);
            // Paths
            mmCtx.strokeStyle = 'rgba(175,150,105,0.7)'; mmCtx.lineWidth = 2;
            [[0, 8, -26, -26], [0, 8, 26, -26], [0, 8, -26, 26], [0, 8, 26, 26], [0, 8, 0, -44]].forEach(([x1, z1, x2, z2]) => {
                const a = toMM(x1, z1), b = toMM(x2, z2);
                mmCtx.beginPath(); mmCtx.moveTo(a.x, a.y); mmCtx.lineTo(b.x, b.y); mmCtx.stroke();
            });
            // Stations
            stations.forEach(s => {
                const p = toMM(s.group.position.x, s.group.position.z);
                const c = '#' + s.proj.color.toString(16).padStart(6, '0');
                mmCtx.fillStyle = c; mmCtx.fillRect(p.x - 3, p.y - 5, 6, 5);
                mmCtx.strokeStyle = c; mmCtx.lineWidth = 1.5;
                mmCtx.beginPath(); mmCtx.moveTo(p.x - 5, p.y - 5); mmCtx.lineTo(p.x + 5, p.y - 5); mmCtx.stroke();
            });
            // Car
            const cp = toMM(carGroup.position.x, carGroup.position.z);
            mmCtx.save(); mmCtx.translate(cp.x, cp.y); mmCtx.rotate(-carAngle);
            mmCtx.fillStyle = '#c94a1a'; mmCtx.beginPath(); mmCtx.moveTo(0, -5); mmCtx.lineTo(-3, 3); mmCtx.lineTo(3, 3); mmCtx.closePath(); mmCtx.fill();
            mmCtx.restore();
        }

        // ─── AUTO TOUR ───────────────────────────────────────────────────────────────
        let tourActive = false, tourIdx = 0, tourPhase = 'drive', tourWait = 0;
        // Tour order: About Me first, then all projects
        const getTourOrder = () => [...stations].sort((a, b) => (a.proj.isAboutMe ? -1 : 0) - (b.proj.isAboutMe ? -1 : 0));
        function toggleTour() {
            tourActive = !tourActive;
            const btn = document.getElementById('tour-btn');
            if (tourActive) {
                tourIdx = 0; tourPhase = 'drive'; tourWait = 0;
                btn.style.background = 'rgba(201,74,26,0.3)';
                btn.style.borderColor = '#e87c3e';
                btn.textContent = '⛩ TOURING... · ツアー中';
                closePanel();
            } else {
                btn.style.background = 'rgba(20,32,40,0.82)';
                btn.textContent = '⛩ AUTO TOUR · 自動ツアー';
                closePanel();
            }
        }
        window.toggleTour = toggleTour;
        document.addEventListener('keydown', e => { if (e.key.toLowerCase() === 't') toggleTour(); });
        function updateTour() {
            if (!tourActive) return;
            const order = getTourOrder();
            if (tourIdx >= order.length) { tourActive = false; toggleTour(); return; }
            const target = order[tourIdx].group.position;
            if (tourPhase === 'drive') {
                // Steer toward target
                const dx = target.x - carGroup.position.x, dz = target.z - carGroup.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 4.5) {
                    carSpeed *= 0.7;
                    tourPhase = 'wait'; tourWait = 180; // ~3s at 60fps
                    openPanel(order[tourIdx].proj);
                    return;
                }
                const targetAngle = Math.atan2(dx, dz);
                let da = targetAngle - carAngle;
                while (da > Math.PI) da -= Math.PI * 2;
                while (da < -Math.PI) da += Math.PI * 2;
                carAngle += da * 0.06;
                carSpeed = Math.min(carSpeed + 0.018, MAX_SPEED * 0.72);
                carGroup.position.x += Math.sin(carAngle) * carSpeed;
                carGroup.position.z += Math.cos(carAngle) * carSpeed;
                carGroup.rotation.y = carAngle;
                resolveCollisions();
                wheels.forEach(w => { w.rotation.x += carSpeed * 3; });
                document.getElementById('speed-val').textContent = String(Math.abs(Math.round(carSpeed * 280))).padStart(3, '0');
            } else if (tourPhase === 'wait') {
                carSpeed = 0;
                tourWait--;
                if (tourWait <= 0) { closePanel(); tourIdx++; tourPhase = 'drive'; }
            }
        }

        // ─── ANIMATE ─────────────────────────────────────────────────────────────────
        let t = 0;
        function animate() {
            requestAnimationFrame(animate); t += 0.016;
            if (tourActive) updateTour(); else updateCar(); updateCamera(); checkProximity(); updateDayNight();
            stations.forEach((s, i) => {
                const fo = i * 1.3;
                s.light.intensity = 2.2 + Math.sin(t * 1.8 + fo) * 0.5;
                s.lantern.material.emissiveIntensity = 0.4 + Math.sin(t * 2 + fo) * 0.18;
                s.rope.rotation.y += 0.003;
            });
            sun.position.x = 40 + Math.sin(t * 0.018) * 6;
            drawMinimap();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── LOADING ─────────────────────────────────────────────────────────────────
        const steps = [
            [15, 'drawing countryside...'],
            [35, 'planting trees...'],
            [55, 'building gates...'],
            [75, 'prepping car to skkrt skkrt...'],
            [100, '出発 let\'s go!'],
        ];
        let si = 0;
        function loadStep() {
            if (si >= steps.length) {
                setTimeout(() => {
                    const el = document.getElementById('loading'); el.style.opacity = '0';
                    setTimeout(() => { el.style.display = 'none'; initMobileUI(); animate(); }, 900);
                }, 400); return;
            }
            const [pct, msg] = steps[si++];
            document.getElementById('loading-bar').style.width = pct + '%';
            document.getElementById('loading-status').textContent = msg;
            setTimeout(loadStep, 380);
        }
        loadStep();</script>
</body>
</html>
