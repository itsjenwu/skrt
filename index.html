<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;600&display=swap');

        :root {
            --blush: #f2a7b0;
            --peach: #f7cba8;
            --sky: #7a9db8;
            --sage: #7aab88;
            --moss: #4e7a5a;
            --earth: #c9a97a;
            --cream: #e8ddc8;
            --ink: #2e2318;
            --lantern: #e87c3e;
            --sakura: #f4b8c8;
            --torii: #c94a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #4a6878;
            overflow: hidden;
            font-family: 'Noto Serif JP', serif;
            color: var(--ink);
        }

        #canvas {
            display: block;
        }

        /* ── TITLE ── */
        #title {
            position: fixed;
            top: 22px;
            left: 28px;
            z-index: 10;
            pointer-events: none;
        }

        #title-main {
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 26px;
            color: #e8ddc8;
            opacity: 0.9;
            letter-spacing: 2px;
            text-shadow: 1px 2px 0 rgba(255,255,255,0.5);
        }

        #title-sub {
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.6;
            letter-spacing: 4px;
            margin-top: 2px;
        }

        /* ── CONTROLS HINT ── */
        #controls-hint {
            position: fixed;
            bottom: 28px;
            left: 28px;
            font-size: 11px;
            color: #c8b89a;
            opacity: 0.65;
            line-height: 2;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
        }

            #controls-hint b {
                color: var(--torii);
                opacity: 1;
            }

        /* ── SPEEDOMETER ── */
        #speedometer {
            position: fixed;
            bottom: 28px;
            right: 28px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }

        #speed-val {
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 42px;
            color: #e87c3e;
            opacity: 0.7;
            line-height: 1;
        }

        #speed-label {
            font-size: 9px;
            color: #c8b89a;
            opacity: 0.5;
            letter-spacing: 3px;
        }

        /* ── MINIMAP ── */
        #minimap {
            position: fixed;
            top: 22px;
            right: 28px;
            width: 120px;
            height: 120px;
            border-radius: 4px;
            border: 1px solid rgba(46,35,24,0.15);
            background: rgba(20,32,40,0.82);
            box-shadow: 0 2px 12px rgba(46,35,24,0.1);
            overflow: hidden;
            z-index: 10;
        }

            #minimap canvas {
                width: 100%;
                height: 100%;
            }

        #minimap-label {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 7px;
            letter-spacing: 2px;
            color: var(--ink);
            opacity: 0.4;
        }

        /* ── PROMPT ── */
        #prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 60px));
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 10;
        }

            #prompt.visible {
                opacity: 1;
            }

        #prompt-key {
            display: inline-block;
            background: rgba(20,32,40,0.88);
            border: 1.5px solid #e87c3e;
            color: #e87c3e;
            font-family: 'Zen Kurenaido', sans-serif;
            font-size: 13px;
            padding: 8px 20px;
            letter-spacing: 2px;
            border-radius: 2px;
            box-shadow: 0 2px 16px rgba(201,74,26,0.2);
            animation: gentle-pulse 2s infinite;
        }

        #prompt-name {
            margin-top: 8px;
            font-size: 10px;
            color: var(--ink);
            opacity: 0.55;
            letter-spacing: 3px;
        }

        @keyframes gentle-pulse {
            0%,100% {
                box-shadow: 0 2px 16px rgba(201,74,26,0.2);
            }

            50% {
                box-shadow: 0 2px 28px rgba(201,74,26,0.45);
            }
        }

        /* ── PANEL ── */
        #panel {
            position: fixed;
            top: 0;
            right: -520px;
            width: 460px;
            height: 100vh;
            background: rgba(28,38,46,0.96);
            border-left: 2px solid rgba(201,74,26,0.35);
            padding: 52px 38px 40px;
            z-index: 20;
            transition: right 0.55s cubic-bezier(0.16,1,0.3,1);
            overflow-y: auto;
            pointer-events: none;
        }

            #panel.open {
                right: 0;
                pointer-events: all;
            }

            #panel::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: linear-gradient(180deg, var(--torii), var(--blush), var(--torii));
            }

        #panel-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: 1px solid rgba(232,124,62,0.5);
            color: #e87c3e;
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 5px 14px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

            #panel-close:hover {
                background: rgba(201,74,26,0.08);
            }

        .panel-kanji {
            font-size: 11px;
            color: #e87c3e;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .panel-title {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 28px;
            color: #e8ddc8;
            line-height: 1.25;
            margin-bottom: 6px;
        }

        .panel-subtitle {
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.7;
            letter-spacing: 3px;
            margin-bottom: 22px;
        }

        .panel-desc {
            font-size: 13px;
            color: #c8b8a0;
            opacity: 0.9;
            line-height: 2;
            margin-bottom: 28px;
        }

        .panel-divider {
            height: 1px;
            background: linear-gradient(90deg,rgba(201,74,26,0.25),transparent);
            margin: 22px 0;
        }

        .panel-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
        }

        .tech-tag {
            font-size: 10px;
            letter-spacing: 1px;
            border: 1px solid rgba(78,122,90,0.4);
            color: var(--moss);
            padding: 4px 12px;
            border-radius: 2px;
            background: rgba(122,171,136,0.08);
        }

        .panel-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-link {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 11px 22px;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

            .panel-link.primary {
                background: var(--torii);
                color: var(--cream);
                box-shadow: 0 3px 14px rgba(201,74,26,0.3);
            }

                .panel-link.primary:hover {
                    box-shadow: 0 4px 22px rgba(201,74,26,0.45);
                }

            .panel-link.secondary {
                border: 1px solid rgba(78,122,90,0.5);
                color: var(--moss);
                background: transparent;
            }

                .panel-link.secondary:hover {
                    background: rgba(122,171,136,0.1);
                }

        /* ── JOYSTICK ── */
        #joystick-zone {
            position: fixed;
            bottom: 32px;
            left: 32px;
            width: 130px;
            height: 130px;
            z-index: 30;
            display: none;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(254,246,236,0.3);
            border: 1.5px solid rgba(201,74,26,0.3);
            box-shadow: 0 2px 16px rgba(201,74,26,0.1);
        }

        #joystick-stick {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%,rgba(242,167,176,0.7),rgba(201,74,26,0.35));
            border: 1.5px solid rgba(201,74,26,0.6);
            box-shadow: 0 2px 12px rgba(201,74,26,0.3);
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
        }

        /* ── ENTER BTN ── */
        #enter-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: rgba(254,246,236,0.8);
            border: 1.5px solid rgba(201,74,26,0.5);
            color: var(--torii);
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3px;
            z-index: 30;
            cursor: pointer;
            animation: gentle-pulse 2s infinite;
            touch-action: manipulation;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

            #enter-btn.visible {
                opacity: 1;
                pointer-events: all;
            }

        #enter-btn-icon {
            font-size: 22px;
        }

        /* ── LOADING ── */
        #loading {
            position: fixed;
            inset: 0;
            background: #2a3a44;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s;
        }

        #loading-kanji {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 72px;
            color: #e87c3e;
            margin-bottom: 8px;
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0%,100% {
                opacity: 0.7;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.04)
            }
        }

        #loading-title {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 18px;
            color: #c8b89a;
            opacity: 0.85;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }

        #loading-bar-wrap {
            width: 220px;
            height: 2px;
            background: rgba(255,255,255,0.12);
        }

        #loading-bar {
            height: 100%;
            background: linear-gradient(90deg,var(--torii),var(--blush));
            width: 0%;
            transition: width 0.2s ease;
        }

        #loading-status {
            margin-top: 14px;
            font-size: 10px;
            color: #c8b89a;
            opacity: 0.6;
            letter-spacing: 3px;
        }

        /* ── SKI MINIGAME UI ── */
        #ski-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            display: none;
        }

            #ski-overlay.active {
                display: block;
            }

        #ski-hud {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

            #ski-hud.active {
                display: flex;
            }

        #ski-score-label {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 11px;
            color: #c8f0ff;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        #ski-score {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 48px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(160,220,255,0.8);
            line-height: 1;
        }

        #ski-lives {
            font-size: 20px;
            letter-spacing: 4px;
        }

        #ski-start-screen {
            position: fixed;
            inset: 0;
            background: rgba(10,20,40,0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            backdrop-filter: blur(4px);
        }

            #ski-start-screen h2 {
                font-family: 'Zen Kurenaido',sans-serif;
                font-size: 42px;
                color: #c8f0ff;
                letter-spacing: 6px;
                margin-bottom: 10px;
                text-shadow: 0 0 30px rgba(160,220,255,0.6);
            }

            #ski-start-screen p {
                font-size: 12px;
                color: #a0c8e0;
                letter-spacing: 3px;
                margin-bottom: 8px;
                opacity: 0.8;
            }

        #ski-start-btn {
            margin-top: 28px;
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            padding: 14px 40px;
            background: rgba(100,180,255,0.15);
            border: 1.5px solid rgba(160,220,255,0.6);
            color: #c8f0ff;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            pointer-events: all;
        }

            #ski-start-btn:hover {
                background: rgba(100,180,255,0.28);
            }

        #ski-end-screen {
            position: fixed;
            inset: 0;
            background: rgba(10,20,40,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            backdrop-filter: blur(4px);
        }

            #ski-end-screen.show {
                display: flex;
            }

        #ski-end-title {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 52px;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        #ski-end-score {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 22px;
            color: #c8f0ff;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        #ski-end-best {
            font-size: 11px;
            color: #a0c8e0;
            letter-spacing: 3px;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        #ski-end-btns {
            display: flex;
            gap: 14px;
        }

        .ski-btn {
            font-family: 'Zen Kurenaido',sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 11px 28px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: all;
        }

        #ski-retry-btn {
            background: rgba(100,180,255,0.18);
            border: 1.5px solid rgba(160,220,255,0.6);
            color: #c8f0ff;
        }

            #ski-retry-btn:hover {
                background: rgba(100,180,255,0.32);
            }

        #ski-exit-btn {
            background: transparent;
            border: 1px solid rgba(201,74,26,0.5);
            color: #e87c3e;
        }

            #ski-exit-btn:hover {
                background: rgba(201,74,26,0.1);
            }

        /* Mobile ski arrows */
        #ski-mobile-btns {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 24px;
            z-index: 56;
            pointer-events: all;
        }

            #ski-mobile-btns.active {
                display: flex;
            }

        .ski-arrow {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(200,240,255,0.18);
            border: 1.5px solid rgba(160,220,255,0.5);
            color: #c8f0ff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        /* ── RESPONSIVE ── */
        @media(max-width:600px) {
            #panel {
                width: 100vw;
                right: -100vw;
                padding: 56px 22px 40px;
            }

                #panel.open {
                    right: 0;
                }

            .panel-title {
                font-size: 22px;
            }

            #title-main {
                font-size: 18px;
            }

            #minimap {
                top: 14px;
                right: 14px;
                width: 88px;
                height: 88px;
            }

            #speedometer {
                bottom: 175px;
                right: 16px;
            }

            #speed-val {
                font-size: 30px;
            }

            #controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>


    <div id="loading">
        <div id="loading-kanji">旅</div>
        <div id="loading-title">PORTFOLIO</div>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
        <div id="loading-status">loading status...</div>
    </div>

    <div id="ski-hud">
        <div id="ski-score-label">SCORE</div>
        <div id="ski-score">0</div>
        <div id="ski-lives">⛷️⛷️⛷️</div>
    </div>

    <div id="ski-end-screen">
        <div id="ski-end-title">🏔️</div>
        <div id="ski-end-score">SCORE: 0</div>
        <div id="ski-end-best">BEST: 0</div>
        <div id="ski-end-btns">
            <button class="ski-btn" id="ski-retry-btn" onclick="skiRetry()">↺ RETRY</button>
            <button class="ski-btn" id="ski-exit-btn" onclick="skiExit()">← EXIT</button>
        </div>
    </div>

    <div id="ski-mobile-btns">
        <div class="ski-arrow" id="ski-left-btn">◀</div>
        <div class="ski-arrow" id="ski-right-btn">▶</div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="title">
        <div id="title-main">旅</div>
        <div id="title-sub">PORTFOLIO · JOURNEY</div>
    </div>

    <div id="controls-hint">
        <b>W A S D</b> — drive<br>
        <b>E</b> —  explore<br>
        <b>ESC</b> —  close<br>
        <b>T</b> —  tour
    </div>
    <button id="tour-btn" onclick="toggleTour()" style="position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(20,32,40,0.82);border:1.5px solid rgba(201,74,26,0.5);color:#e87c3e;font-family:'Zen Kurenaido',sans-serif;font-size:11px;letter-spacing:2px;padding:7px 20px;cursor:pointer;border-radius:2px;transition:all 0.3s;">⛩ AUTO TOUR · 自動ツアー</button>

    <div id="speedometer">
        <div id="speed-val">000</div>
        <div id="speed-label">KM/H</div>
    </div>

    <div id="minimap">
        <canvas id="minimap-canvas" width="120" height="120"></canvas>
        <div id="minimap-label">MAP</div>
    </div>

    <div id="joystick-zone">
        <div id="joystick-base"></div>
        <div id="joystick-stick"></div>
    </div>

    <div id="enter-btn" onclick="mobileEnter()">
        <div id="enter-btn-icon">⛩</div>
        <div>ENTER</div>
    </div>

    <div id="prompt">
        <div id="prompt-key">[ E ] explore</div>
        <div id="prompt-name"></div>
    </div>

    <div id="panel">
        <button id="panel-close" onclick="closePanel()">✕ close</button>
        <div class="panel-kanji" id="panel-tag">作品</div>
        <div class="panel-title" id="panel-title">Project Title</div>
        <div class="panel-subtitle" id="panel-subtitle">SUBTITLE</div>
        <div id="panel-img-wrap" style="display:none;margin-bottom:18px;border-radius:3px;overflow:hidden;max-height:180px;">
            <img id="panel-img" src="" alt="" style="width:100%;height:180px;object-fit:cover;display:block;opacity:0;transition:opacity 0.5s;" onload="this.style.opacity=1" />
        </div>
        <div class="panel-desc" id="panel-desc">Description</div>
        <div class="panel-divider"></div>
        <div class="panel-tech" id="panel-tech"></div>
        <div class="panel-links">
            <a class="panel-link primary" id="panel-link1" href="#">作品を見る</a>
            <a class="panel-link secondary" id="panel-link2" href="#">ソースコード</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>// ─── PROJECT DATA ─────────────────────────────────────────────────────────────

                tech: ['Unity', 'C#', 'Adobe Illustrator', 'Audacity', 'Adobe Premiere'], link1: 'https://drive.google.com/file/d/1kmz-W9srHWuKlbUBdxAOjL2j9YpLI0kq/view', link1Label: 'ダウンロード · Download', link2: '#', link2Label: 'GitHub', img: 'https://itsjenwu.com/wp-content/uploads/2021/02/lotus-abstract-sticker.png', color: 0xe87c3e, position: { x: -26, z: -26 }
            },
            {
                id: 'p2', name: 'LOST IN SPACE', tag: 'コード · GRAD SCHOOL', title: 'Lost in Space', subtitle: 'PARTICLE FILTER · LOCALIZATION',
                desc: 'After a wormhole drops our spaceship in an unknown location, a particle filter localizes us by measuring gravitational pull from planets. Estimates spaceship position (x,y), then computes the angle to Earth to beam messages home. Handles noisy sensors and nonlinear inverse-square gravity dynamics.',
                tech: ['Python', 'Particle Filter', 'Localization', 'SLAM'], link1: 'https://itsjenwu.com/lost-in-space/', link1Label: '作品を見る · View', link2: '#', link2Label: 'GitHub', img: 'https://itsjenwu.com/wp-content/uploads/2025/03/test4-1.gif', color: 0xc94a1a, position: { x: 26, z: -26 }
            },
            {

        carGroup.position.set(0, 0, 8);



        // ─── TOUCH / JOYSTICK ────────────────────────────────────────────────────────
        const isTouchDevice = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        function initMobileUI() {
            if (!isTouchDevice()) return;
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('enter-btn').style.display = 'flex';
            document.getElementById('controls-hint').style.display = 'none';
        }
        const joystick = { active: false, x: 0, y: 0, touchId: null };
        const STICK_LIMIT = 40;
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        function getJoyCenter() { const r = joystickZone.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
        function updateJoystick(t) {
            const c = getJoyCenter(); let dx = t.clientX - c.x, dy = t.clientY - c.y;
            const d = Math.sqrt(dx * dx + dy * dy); if (d > STICK_LIMIT) { dx = (dx / d) * STICK_LIMIT; dy = (dy / d) * STICK_LIMIT; }
            joystick.x = dx / STICK_LIMIT; joystick.y = dy / STICK_LIMIT;
            joystickStick.style.transform = `translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        }
        joystickZone.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; joystick.active = true; joystick.touchId = t.identifier; updateJoystick(t); }, { passive: false });
        joystickZone.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === joystick.touchId) updateJoystick(t); }, { passive: false });
        joystickZone.addEventListener('touchend', e => { for (const t of e.changedTouches) if (t.identifier === joystick.touchId) { joystick.active = false; joystick.x = 0; joystick.y = 0; joystick.touchId = null; joystickStick.style.transform = 'translate(-50%,-50%)'; } });

        // ─── CAR PHYSICS ─────────────────────────────────────────────────────────────
        const keys = {};
        let carSpeed = 0, carAngle = 0;
        const MAX_SPEED = 0.65, ACCEL = 0.022, FRICTION = 0.91, TURN = 0.042;
        document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        function updateCar() {
            const fwd = keys['w'] || keys['arrowup'] || joystick.y < -0.2;
            const bwd = keys['s'] || keys['arrowdown'] || joystick.y > 0.2;
            const lft = keys['a'] || keys['arrowleft'] || joystick.x < -0.2;
            const rgt = keys['d'] || keys['arrowright'] || joystick.x > 0.2;
            const jm = joystick.active ? Math.abs(joystick.x) : 1;
            if (fwd) carSpeed = Math.min(carSpeed + ACCEL, MAX_SPEED);
            if (bwd) carSpeed = Math.max(carSpeed - ACCEL, -MAX_SPEED * 0.5);
            carSpeed *= FRICTION;
            if (Math.abs(carSpeed) > 0.005) {
                const dir = carSpeed > 0 ? 1 : -1, amt = TURN * (joystick.active ? jm * 1.2 : 1);
                if (lft) carAngle += amt * dir;
                if (rgt) carAngle -= amt * dir;
            }
            carGroup.position.x += Math.sin(carAngle) * carSpeed;
            carGroup.position.z += Math.cos(carAngle) * carSpeed;
            carGroup.rotation.y = carAngle;
            carGroup.position.x = Math.max(-88, Math.min(88, carGroup.position.x));
            carGroup.position.z = Math.max(-88, Math.min(88, carGroup.position.z));
            resolveCollisions(); // push car out of any overlapping objects
            wheels.forEach(w => { w.rotation.x += carSpeed * 3; });
            document.getElementById('speed-val').textContent = String(Math.abs(Math.round(carSpeed * 280))).padStart(3, '0');
        }

        // ─── CAMERA ──────────────────────────────────────────────────────────────────
        const camOff = new THREE.Vector3(0, 6, -13), camLk = new THREE.Vector3(0, 1, 5);
        let smoothCam = new THREE.Vector3(0, 6, 21);
        function updateCamera() {
            const rot = new THREE.Euler(0, carAngle, 0);
            smoothCam.lerp(carGroup.position.clone().add(camOff.clone().applyEuler(rot)), 0.09);
            camera.position.copy(smoothCam);
            camera.lookAt(carGroup.position.clone().add(camLk.clone().applyEuler(rot)));
        }

        // ─── PROXIMITY + PANEL ───────────────────────────────────────────────────────
        let nearStation = null, panelOpen = false;
        function checkProximity() {
            if (SKI.active) return;
            // Reset prompt first
            const pr = document.getElementById('prompt'), pn = document.getElementById('prompt-name'), eb = document.getElementById('enter-btn');
            document.getElementById('prompt-key').textContent = '[ E ] 探索する';
            let closest = null, minD = 9;
            stations.forEach(s => {
                const dx = carGroup.position.x - s.group.position.x, dz = carGroup.position.z - s.group.position.z;
                const d = Math.sqrt(dx * dx + dz * dz); if (d < minD) { minD = d; closest = s; }
            });
            // Check ski gate
            const sgdx = carGroup.position.x - SKI_GATE_X, sgdz = carGroup.position.z - SKI_GATE_Z;
            const sgd = Math.sqrt(sgdx * sgdx + sgdz * sgdz);
            if (sgd < 5 && !panelOpen) {
                nearStation = { proj: null, isSki: true };
                pr.classList.add('visible');
                pn.textContent = '⛷ SKI GATE · スキー場';
                document.getElementById('prompt-key').textContent = '[ E ] 入る · ENTER';
                eb.classList.add('visible');
                return;
            }
            if (closest && !panelOpen) { nearStation = closest; pr.classList.add('visible'); pn.textContent = closest.proj.name; eb.classList.add('visible'); }
            else { nearStation = null; pr.classList.remove('visible'); eb.classList.remove('visible'); }
        }
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'e' && nearStation && !panelOpen) {
                if (nearStation.isSki) enterSki();
                else openPanel(nearStation.proj);
            }
            if (e.key === 'Escape') { closePanel(); if (SKI.active) skiExit(); }
        });
        function mobileEnter() {
            if (nearStation && !panelOpen) {
                if (nearStation.isSki) enterSki();
                else openPanel(nearStation.proj);
            }
        }
        window.mobileEnter = mobileEnter;
        function openPanel(proj) {
            panelOpen = true;
            document.getElementById('panel-tag').textContent = proj.tag;
            document.getElementById('panel-title').textContent = proj.title;
            document.getElementById('panel-subtitle').textContent = proj.subtitle;
            document.getElementById('panel-desc').textContent = proj.desc;
            document.getElementById('panel-tech').innerHTML = proj.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');
            document.getElementById('panel-link1').href = proj.link1;
            document.getElementById('panel-link1').textContent = proj.link1Label || '作品を見る · View';
            document.getElementById('panel-link2').href = proj.link2;
            document.getElementById('panel-link2').textContent = proj.link2Label || 'GitHub';
            // Panel image
            const imgWrap = document.getElementById('panel-img-wrap');
            const imgEl = document.getElementById('panel-img');
            if (proj.img) { imgWrap.style.display = 'block'; imgEl.style.opacity = '0'; imgEl.src = proj.img; }
            else { imgWrap.style.display = 'none'; imgEl.src = ''; }
            document.getElementById('panel').classList.add('open');
            document.getElementById('prompt').classList.remove('visible');
        }
        function closePanel() { panelOpen = false; document.getElementById('panel').classList.remove('open'); }
        window.closePanel = closePanel;

        // ─── MINIMAP ─────────────────────────────────────────────────────────────────
        const mmC = document.getElementById('minimap-canvas'), mmCtx = mmC.getContext('2d');
        const MM = 120, MW = 100;
        function toMM(x, z) { return { x: (x / MW + 0.5) * MM, y: (z / MW + 0.5) * MM }; }
        function drawMinimap() {
            mmCtx.fillStyle = 'rgba(205,190,165,0.9)'; mmCtx.fillRect(0, 0, MM, MM);
            const grd = mmCtx.createRadialGradient(MM / 2, MM / 2, 8, MM / 2, MM / 2, MM / 2);
            grd.addColorStop(0, 'rgba(170,205,150,0.45)'); grd.addColorStop(1, 'rgba(150,175,130,0.6)');
            mmCtx.fillStyle = grd; mmCtx.fillRect(0, 0, MM, MM);
            // Paths
            mmCtx.strokeStyle = 'rgba(175,150,105,0.7)'; mmCtx.lineWidth = 2;
            [[0, 8, -26, -26], [0, 8, 26, -26], [0, 8, -26, 26], [0, 8, 26, 26], [0, 8, 0, -44]].forEach(([x1, z1, x2, z2]) => {
                const a = toMM(x1, z1), b = toMM(x2, z2);
                mmCtx.beginPath(); mmCtx.moveTo(a.x, a.y); mmCtx.lineTo(b.x, b.y); mmCtx.stroke();
            });
            // Stations
            stations.forEach(s => {
                const p = toMM(s.group.position.x, s.group.position.z);
                const c = '#' + s.proj.color.toString(16).padStart(6, '0');
                mmCtx.fillStyle = c; mmCtx.fillRect(p.x - 3, p.y - 5, 6, 5);
                mmCtx.strokeStyle = c; mmCtx.lineWidth = 1.5;
                mmCtx.beginPath(); mmCtx.moveTo(p.x - 5, p.y - 5); mmCtx.lineTo(p.x + 5, p.y - 5); mmCtx.stroke();
            });
            // Ski gate marker
            const sgp = toMM(SKI_GATE_X, SKI_GATE_Z);
            mmCtx.fillStyle = '#44aaff';
            mmCtx.font = 'bold 9px sans-serif';
            mmCtx.fillText('⛷', sgp.x - 5, sgp.y + 4);
            mmCtx.strokeStyle = '#44aaff'; mmCtx.lineWidth = 1;
            mmCtx.strokeRect(sgp.x - 7, sgp.y - 8, 14, 12);
            // Car
            const cp = toMM(carGroup.position.x, carGroup.position.z);
            mmCtx.save(); mmCtx.translate(cp.x, cp.y); mmCtx.rotate(-carAngle);
            mmCtx.fillStyle = '#c94a1a'; mmCtx.beginPath(); mmCtx.moveTo(0, -5); mmCtx.lineTo(-3, 3); mmCtx.lineTo(3, 3); mmCtx.closePath(); mmCtx.fill();
            mmCtx.restore();
        }

        // ─── AUTO TOUR ───────────────────────────────────────────────────────────────
        let tourActive = false, tourIdx = 0, tourPhase = 'drive', tourWait = 0;
        // Tour order: About Me first, then all projects
        const getTourOrder = () => [...stations].sort((a, b) => (a.proj.isAboutMe ? -1 : 0) - (b.proj.isAboutMe ? -1 : 0));
        function toggleTour() {
            tourActive = !tourActive;
            const btn = document.getElementById('tour-btn');
            if (tourActive) {
                tourIdx = 0; tourPhase = 'drive'; tourWait = 0;
                btn.style.background = 'rgba(201,74,26,0.3)';
                btn.style.borderColor = '#e87c3e';
                btn.textContent = '⛩ TOURING... · ツアー中';
                closePanel();
            } else {
                btn.style.background = 'rgba(20,32,40,0.82)';
                btn.textContent = '⛩ AUTO TOUR · 自動ツアー';
                closePanel();
            }
        }
        window.toggleTour = toggleTour;
        document.addEventListener('keydown', e => { if (e.key.toLowerCase() === 't') toggleTour(); });
        function updateTour() {
            if (!tourActive) return;
            const order = getTourOrder();
            if (tourIdx >= order.length) { tourActive = false; toggleTour(); return; }
            const target = order[tourIdx].group.position;
            if (tourPhase === 'drive') {
                // Steer toward target
                const dx = target.x - carGroup.position.x, dz = target.z - carGroup.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 4.5) {
                    carSpeed *= 0.7;
                    tourPhase = 'wait'; tourWait = 180; // ~3s at 60fps
                    openPanel(order[tourIdx].proj);
                    return;
                }
                const targetAngle = Math.atan2(dx, dz);
                let da = targetAngle - carAngle;
                while (da > Math.PI) da -= Math.PI * 2;
                while (da < -Math.PI) da += Math.PI * 2;
                carAngle += da * 0.06;
                carSpeed = Math.min(carSpeed + 0.018, MAX_SPEED * 0.72);
                carGroup.position.x += Math.sin(carAngle) * carSpeed;
                carGroup.position.z += Math.cos(carAngle) * carSpeed;
                carGroup.rotation.y = carAngle;
                resolveCollisions();
                wheels.forEach(w => { w.rotation.x += carSpeed * 3; });
                document.getElementById('speed-val').textContent = String(Math.abs(Math.round(carSpeed * 280))).padStart(3, '0');
            } else if (tourPhase === 'wait') {
                carSpeed = 0;
                tourWait--;
                if (tourWait <= 0) { closePanel(); tourIdx++; tourPhase = 'drive'; }
            }
        }

        // ─── SKI GATE (world object) ──────────────────────────────────────────────────
        // Terrain height formula: rim=(d-52)/60, h=rim*(7+sin*3+cos*2.5)+extra
        // At x=52,z=-52: d≈73.5, rim≈0.36, h≈3.3 — so we lift the gate by that amount
        const SKI_GATE_X = 52, SKI_GATE_Z = -52;
        const SKI_GATE_Y = 4.5; // raised to sit on the hillside terrain
        (function buildSkiGate() {
            const g = new THREE.Group();
            const poleMat = new THREE.MeshLambertMaterial({ color: 0xdd2222 });
            const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            [-2.2, 2.2].forEach(x => {
                for (let seg = 0; seg < 5; seg++) {
                    const m = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.12, 0.12, 0.7, 6),
                        seg % 2 === 0 ? poleMat : whiteMat
                    );
                    m.position.set(x, 0.35 + seg * 0.7, 0);
                    g.add(m);
                }
                const flag = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.06), poleMat);
                flag.position.set(x + (x > 0 ? 0.35 : -0.35), 3.8, 0);
                g.add(flag);
            });
            const banner = new THREE.Mesh(
                new THREE.BoxGeometry(4.6, 0.28, 0.08),
                new THREE.MeshLambertMaterial({ color: 0x1155cc })
            );
            banner.position.set(0, 3.5, 0); g.add(banner);
            const gl = new THREE.PointLight(0x44aaff, 2.5, 14);
            gl.position.set(0, 3.5, 0); g.add(gl);
            const snowGeo = new THREE.BufferGeometry();
            const sv = [];
            for (let i = 0; i < 60; i++) sv.push((Math.random() - 0.5) * 6, (Math.random()) * 4, (Math.random() - 0.5) * 3);
            snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
            g.add(new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0xeef8ff, size: 0.12, transparent: true, opacity: 0.7 })));
            g.position.set(SKI_GATE_X, SKI_GATE_Y, SKI_GATE_Z);
            scene.add(g);
        })();

        // ─── SKI MINIGAME ─────────────────────────────────────────────────────────────
        const SKI = {
            active: false,
            started: false,
            lives: 3,
            score: 0,
            best: 0,
            skiX: 0,          // player lane position (-1 to 1 normalised)
            skiSpeed: 0,       // downhill scroll speed

            leftHeld: false,
            rightHeld: false,

            // Obstacle pool — each: { x, z, type, mesh }
            obstacles: [],
            // Scenery (trees/moguls scrolling past)
            scenery: [],

        // ── Build ski scene objects ──────────────────────────────────────────────────
        function buildSkiScene() {
            SKI.skiScene = new THREE.Scene();
            SKI.skiScene.background = new THREE.Color(0x9ac8e8);
            SKI.skiScene.fog = new THREE.FogExp2(0xb8daf0, 0.022);

            // Lighting

            sun2.position.set(10, 20, 10); SKI.skiScene.add(sun2);
            SKI.skiScene.add(new THREE.HemisphereLight(0x9ac8e8, 0xd8eef8, 0.7));

            // Infinite snow slope — two long panels we'll leapfrog to simulate scrolling
            const slopeMat = new THREE.MeshLambertMaterial({ color: 0xe8f4ff });
            SKI.slopePanels = [];
            for (let i = 0; i < 3; i++) {
                const m = new THREE.Mesh(new THREE.PlaneGeometry(24, 80), slopeMat);
                m.rotation.x = -Math.PI / 2;
                m.position.set(0, -0.01, -40 * i);

            }
            // Slope edge trees (fixed decoration)
            const treeMat = new THREE.MeshLambertMaterial({ color: 0x3a7a4a });
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
            for (let i = 0; i < 20; i++) {
                [-12, 12].forEach(sx => {
                    const tg = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 1.2, 5), trunkMat);
                    trunk.position.set(0, 0.6, 0); tg.add(trunk);
                    const crown = new THREE.Mesh(new THREE.ConeGeometry(1.0, 2.0, 6), treeMat);
                    crown.position.set(0, 2.2, 0); tg.add(crown);

                    SKI.skiScene.add(tg);
                });
            }
            // Slope edge lines (ski run markers)
            const lineMat = new THREE.MeshLambertMaterial({ color: 0xff4422 });
            [-9, 9].forEach(x => {
                const lm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 300), lineMat);
                lm.position.set(x, 0.02, -150); SKI.skiScene.add(lm);
            });

            // Player car mesh (simplified kei car shape for ski mode)
            const pg = new THREE.Group();
            const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 2.0), new THREE.MeshLambertMaterial({ color: 0xe8c0a0 }));
            carBody.position.set(0, 0.2, 0); pg.add(carBody);

            // Obstacle pool — pre-create 24 obstacle meshes
            SKI.obstacles = [];
            const obsMats = [
                new THREE.MeshLambertMaterial({ color: 0x888090 }), // rock
                new THREE.MeshLambertMaterial({ color: 0x3a6a3a }), // tree stump
                new THREE.MeshLambertMaterial({ color: 0xd0e8ff }), // snowdrift

            const obsGeos = [
                new THREE.DodecahedronGeometry(0.65, 0),
                new THREE.CylinderGeometry(0.4, 0.55, 1.0, 6),
                new THREE.SphereGeometry(0.7, 6, 4),

            for (let i = 0; i < 24; i++) {

            SKI.flashLight.position.set(0, 3, 0);

        }

        // ── Spawn an obstacle ────────────────────────────────────────────────────────
        function spawnObstacle() {
            const obs = SKI.obstacles.find(o => !o.active);
            if (!obs) return;
            obs.active = true;
            obs.x = (Math.random() - 0.5) * 14;
            obs.z = SKI.playerMesh.position.z - 50 - Math.random() * 20;

            obs.mesh.visible = true;
            obs.mesh.rotation.y = Math.random() * Math.PI * 2;
        }

        // ── Enter ski minigame ───────────────────────────────────────────────────────
        function enterSki() {
            if (SKI.active) return;
            SKI.active = true;
            SKI.started = false;
            // Save world state
            SKI.savedCarPos = carGroup.position.clone();
            SKI.savedCarAngle = carAngle;
            // Hide world HUD
            ['title', 'controls-hint', 'minimap', 'speedometer', 'prompt', 'tour-btn'].forEach(id => {
                const el = document.getElementById(id); if (el) el.style.display = 'none';
            });
            closePanel();
            if (tourActive) toggleTour();
            // Build ski scene if first time
            if (!SKI.skiScene) buildSkiScene();
            // Reset state
            SKI.lives = 3; SKI.score = 0; SKI.skiTime = 0;
            SKI.skiSpeed = 0.18; SKI.skiX = 0; SKI.invincible = 0;
            SKI.playerMesh.position.set(0, 0.06, 0);
            SKI.obstacles.forEach(o => { o.active = false; o.mesh.visible = false; });
            updateSkiHUD();
            // Show start screen
            document.getElementById('ski-hud').classList.add('active');
            // Build and show start screen dynamically
            let ss = document.getElementById('ski-start-screen');
            if (!ss) {
                ss = document.createElement('div');
                ss.id = 'ski-start-screen';
                ss.innerHTML = `
          <h2>⛷ スキー · SKI RUN</h2>
          <p>← → or A D — steer left / right</p>
          <p>Dodge rocks, stumps and snowdrifts</p>
          <p>You have 3 lives · 3ライフ</p>
          <button id="ski-start-btn" onclick="skiBegin()">▶ スタート · START</button>`;
                document.body.appendChild(ss);
            }
            ss.style.display = 'flex';
            ss.style.flexDirection = 'column';
            ss.style.alignItems = 'center';
            ss.style.justifyContent = 'center';
            // Mobile buttons
            if (isTouchDevice()) {
                const mb = document.getElementById('ski-mobile-btns');
                mb.classList.add('active');
                document.getElementById('ski-left-btn').ontouchstart = () => { SKI.leftHeld = true; };
                document.getElementById('ski-left-btn').ontouchend = () => { SKI.leftHeld = false; };
                document.getElementById('ski-right-btn').ontouchstart = () => { SKI.rightHeld = true; };
                document.getElementById('ski-right-btn').ontouchend = () => { SKI.rightHeld = false; };
            }
        }
        window.enterSki = enterSki;

        function skiBegin() {
            const ss = document.getElementById('ski-start-screen');
            if (ss) ss.style.display = 'none';
            SKI.started = true;
            // Seed initial obstacles
            for (let i = 0; i < 8; i++) spawnObstacle();
        }
        window.skiBegin = skiBegin;

        function updateSkiHUD() {
            document.getElementById('ski-score').textContent = Math.floor(SKI.score);
            const livesEl = document.getElementById('ski-lives');
            livesEl.textContent = '⛷️'.repeat(Math.max(0, SKI.lives)) + '💀'.repeat(Math.max(0, 3 - SKI.lives));
        }

        function skiRetry() {
            document.getElementById('ski-end-screen').classList.remove('show');
            SKI.lives = 3; SKI.score = 0; SKI.skiTime = 0; SKI.skiSpeed = 0.18; SKI.skiX = 0; SKI.invincible = 0;
            SKI.playerMesh.position.set(0, 0.06, 0);
            SKI.obstacles.forEach(o => { o.active = false; o.mesh.visible = false; });
            for (let i = 0; i < 8; i++) spawnObstacle();
            SKI.started = true;
            updateSkiHUD();
        }
        window.skiRetry = skiRetry;

        function skiExit() {
            SKI.active = false; SKI.started = false;
            document.getElementById('ski-end-screen').classList.remove('show');
            document.getElementById('ski-hud').classList.remove('active');
            document.getElementById('ski-mobile-btns').classList.remove('active');
            // Restore world HUD
            ['title', 'minimap', 'speedometer', 'tour-btn'].forEach(id => {
                const el = document.getElementById(id); if (el) el.style.display = '';
            });
            document.getElementById('controls-hint').style.display = '';
            // Restore car
            if (SKI.savedCarPos) { carGroup.position.copy(SKI.savedCarPos); carAngle = SKI.savedCarAngle; carGroup.rotation.y = carAngle; }
            carSpeed = 0;
        }
        window.skiExit = skiExit;

        // ── Ski update (called each frame when active) ────────────────────────────────
        function updateSki() {
            if (!SKI.active || !SKI.started) return;
            SKI.skiTime++;

            // Ramp up speed over time (caps at a thrilling 1.1)
            SKI.skiSpeed = Math.min(1.1, 0.18 + SKI.skiTime * 0.00018);
            SKI.score += SKI.skiSpeed * 0.9;

            // Steer input (keyboard OR mobile buttons)
            const lft = keys['a'] || keys['arrowleft'] || SKI.leftHeld;
            const rgt = keys['d'] || keys['arrowright'] || SKI.rightHeld;
            const steerAmt = 0.055 + SKI.skiSpeed * 0.018;
            if (lft) SKI.skiX = Math.max(-8.5, SKI.skiX - steerAmt);
            if (rgt) SKI.skiX = Math.min(8.5, SKI.skiX + steerAmt);
            // Natural gravity drift back to center (slight)
            SKI.skiX *= 0.985;

            // Move player mesh forward (we scroll everything toward camera)
            SKI.playerMesh.position.x = SKI.skiX;
            // Lean mesh based on turning
            SKI.playerMesh.rotation.z = (lft ? 0.18 : rgt ? -0.18 : 0);
            SKI.playerMesh.rotation.y = (lft ? 0.15 : rgt ? -0.15 : 0);

            // Scroll slope panels
            SKI.slopePanels.forEach(p => {
                p.position.z += SKI.skiSpeed;
                if (p.position.z > 50) p.position.z -= 240;
            });

            // Scroll and recycle obstacles
            let spawnChance = 0.04 + SKI.skiTime * 0.00004;
            SKI.obstacles.forEach(o => {
                if (!o.active) return;
                o.z += SKI.skiSpeed;
                o.mesh.position.z = o.z;
                // Recycle if gone past camera
                if (o.z > 8) { o.active = false; o.mesh.visible = false; }
                // Collision check
                if (SKI.invincible <= 0) {
                    const dx = SKI.playerMesh.position.x - o.x;
                    const dz = SKI.playerMesh.position.z - o.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 1.1) {
                        SKI.lives--;
                        SKI.invincible = 90; // ~1.5s grace
                        SKI.flashLight.color.set(0xff2200);
                        SKI.flashLight.intensity = 6;
                        updateSkiHUD();
                        if (SKI.lives <= 0) { skiGameOver(); return; }
                    }
                }
                // Near-miss bonus — within 1.9 but not hit
                if (SKI.invincible <= 0) {
                    const dx2 = SKI.playerMesh.position.x - o.x, dz2 = SKI.playerMesh.position.z - o.z;
                    if (Math.sqrt(dx2 * dx2 + dz2 * dz2) < 1.9) { SKI.score += 2; SKI.flashLight.color.set(0x00ffaa); SKI.flashLight.intensity = 3; }
                }
            });

            // Spawn new obstacles
            if (Math.random() < spawnChance) spawnObstacle();

            // Decay flash light
            SKI.flashLight.intensity *= 0.88;
            if (SKI.invincible > 0) { SKI.invincible--; SKI.playerMesh.visible = (Math.floor(SKI.invincible / 5) % 2 === 0); }
            else SKI.playerMesh.visible = true;

            // Camera follows player x with slight lag
            SKI.skiCamera.position.x += (SKI.skiX * 0.3 - SKI.skiCamera.position.x) * 0.08;

            // Update HUD every 6 frames
            if (SKI.skiTime % 6 === 0) updateSkiHUD();
        }

        function skiGameOver() {
            SKI.started = false;
            if (SKI.score > SKI.best) SKI.best = SKI.score;
            const wipeouts = ['ぼた雪！ WIPEOUT!', '転倒！ CRASH!', 'やばい！ OH NO!'];
            document.getElementById('ski-end-title').textContent = wipeouts[Math.floor(Math.random() * wipeouts.length)];
            document.getElementById('ski-end-title').style.color = '#ff6644';
            document.getElementById('ski-end-score').textContent = 'SCORE: ' + Math.floor(SKI.score);
            document.getElementById('ski-end-best').textContent = 'BEST: ' + Math.floor(SKI.best);
            document.getElementById('ski-end-screen').classList.add('show');
        }

        // ── Gate proximity check (integrated into checkProximity) ────────────────────
        function checkSkiGate() {
            const dx = carGroup.position.x - SKI_GATE_X, dz = carGroup.position.z - SKI_GATE_Z;
            const d = Math.sqrt(dx * dx + dz * dz);
            if (d < 5 && !SKI.active && !panelOpen) {
                const pr = document.getElementById('prompt'), pn = document.getElementById('prompt-name');
                pr.classList.add('visible');
                pn.textContent = '⛷ SKI GATE · スキー場';
                document.getElementById('prompt-key').textContent = '[ E ] 入る · ENTER';
                nearStation = { proj: null, isSki: true };
            }
        }
        let t = 0;
        function animate() {
            requestAnimationFrame(animate); t += 0.016;
            if (SKI.active) {
                updateSki();
                if (SKI.skiScene) renderer.render(SKI.skiScene, SKI.skiCamera);
                return;
            }
            if (tourActive) updateTour(); else updateCar(); updateCamera(); checkProximity(); updateDayNight();
            stations.forEach((s, i) => {
                const fo = i * 1.3;
                s.light.intensity = 2.2 + Math.sin(t * 1.8 + fo) * 0.5;
                s.lantern.material.emissiveIntensity = 0.4 + Math.sin(t * 2 + fo) * 0.18;
                s.rope.rotation.y += 0.003;
            });
            sun.position.x = 40 + Math.sin(t * 0.018) * 6;
            drawMinimap();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── LOADING ─────────────────────────────────────────────────────────────────
        const steps = [
            [15, '里山を描いています... drawing countryside'],
            [35, '桜を植えています... planting sakura'],
            [55, '鳥居を建てています... building torii gates'],
            [75, '軽自動車を準備中... preparing kei car'],
            [100, '出発しましょう！ let\'s go!'],
        ];
        let si = 0;
        function loadStep() {
            if (si >= steps.length) {
                setTimeout(() => {
                    const el = document.getElementById('loading'); el.style.opacity = '0';
                    setTimeout(() => { el.style.display = 'none'; initMobileUI(); animate(); }, 900);
                }, 400); return;
            }
            const [pct, msg] = steps[si++];
            document.getElementById('loading-bar').style.width = pct + '%';
            document.getElementById('loading-status').textContent = msg;
            setTimeout(loadStep, 380);
        }
        loadStep();</script>
</body>
</html>
